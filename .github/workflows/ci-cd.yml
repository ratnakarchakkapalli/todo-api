name: Todo API - Full CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/todo-api

jobs:
  # ==================== CI: Lint & Test ====================
  lint-and-test:
    runs-on: ubuntu-latest
    name: Lint & Test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: false

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
        continue-on-error: true

  # ==================== BUILD: Docker Image ====================
  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Image digest
        run: echo "Image pushed successfully with tag ${{ github.sha }}"

  # ==================== DEPLOY: Staging ====================
  deploy-staging:
    needs: build-docker
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging (simulate)
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Staging deployment simulated successfully"

      - name: Run smoke tests
        run: |
          echo "🔍 Running smoke tests on staging..."
          # In real scenario, curl the staging URL
          # curl https://staging-todo-api.example.com/health
          echo "✅ Smoke tests passed"

  # ==================== APPROVAL: Manual Gate ====================
  approval:
    needs: deploy-staging
    runs-on: ubuntu-latest
    name: Manual Approval Required
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Waiting for approval
        run: |
          echo "⏸️  Waiting for manual approval to deploy to production..."
          echo "Reviewer: Please check staging deployment before approving"

  # ==================== DEPLOY: Production ====================
  deploy-production:
    needs: approval
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://production-todo-api.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production (simulate)
        run: |
          echo "🚀 Deploying to production..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Production deployment simulated successfully"

      - name: Health check
        run: |
          echo "🏥 Running health checks..."
          # In real scenario, curl the production URL
          # curl https://todo-api.example.com/health
          echo "✅ Health checks passed"

      - name: Deployment notification
        run: |
          echo "✅ Successfully deployed to production!"
          echo "Version: ${{ github.sha }}"
